services:
  postgres:
    image: postgres:16-alpine
    container_name: easyschool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: easyschool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - easyschool_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d easyschool"]
      interval: 5s
      timeout: 5s
      retries: 10

  # pgAdmin opcional: rode com  docker compose --profile tools up -d
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: easyschool-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@easyschool.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  easyschool_pgdata:
